<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f9f9f9"/>
  
  <!-- ネットワーク/つながりを連想させるグラフィック -->
  <g stroke="#8e1c3a" stroke-width="2" opacity="0.5">
    <line x1="100" y1="100" x2="200" y2="150"/>
    <line x1="200" y1="150" x2="300" y2="80"/>
    <line x1="200" y1="150" x2="250" y2="220"/>
    <line x1="100" y1="100" x2="150" y2="200"/>
    <line x1="150" y1="200" x2="250" y2="220"/>
  </g>

  <!-- スポンサーの企業を連想させるノード -->
  <circle cx="100" cy="100" r="20" fill="#fff" stroke="#8e1c3a" stroke-width="4"/>
  <circle cx="300" cy="80" r="25" fill="#fff" stroke="#8e1c3a" stroke-width="4"/>
  <circle cx="150" cy="200" r="15" fill="#fff" stroke="#8e1c3a" stroke-width="4"/>
  <circle cx="250" cy="220" r="20" fill="#fff" stroke="#8e1c3a" stroke-width="4"/>
  
  <!-- EDUMIRARロゴ（中央） -->
  <circle cx="200" cy="150" r="35" fill="#8e1c3a"/>
  <!-- フクロウの目のような装飾 -->
  <circle cx="185" cy="145" r="5" fill="#fff"/>
  <circle cx="215" cy="145" r="5" fill="#fff"/>
  <path d="M190 160 Q200 170 210 160" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

  <!-- テキスト -->
  <text x="200" y="270" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="28" fill="#333" letter-spacing="2">PARTNER</text>
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">WITH EDUMIRAR OSAKA</text>
</svg>
