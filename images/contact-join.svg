<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <!-- 斜め分割用のクリップパス -->
    <clipPath id="left-diagonal">
      <polygon points="0,0 250,0 150,300 0,300" />
    </clipPath>
    <clipPath id="right-diagonal">
      <polygon points="250,0 400,0 400,300 150,300" />
    </clipPath>
  </defs>

  <!-- 左側：サッカー -->
  <g clip-path="url(#left-diagonal)">
    <rect width="400" height="300" fill="#f0eeee"/>
    <!-- サッカーボール -->
    <circle cx="100" cy="200" r="30" fill="#fff" stroke="#333" stroke-width="2"/>
    <path d="M100 170 L115 190 L95 215 L75 190 Z" fill="#333"/>
    <path d="M100 170 L100 200 L115 190" stroke="#333" stroke-width="2"/>
    <!-- 足のシルエット -->
    <path d="M50 120 Q80 150 70 200" fill="none" stroke="#8e1c3a" stroke-width="15" stroke-linecap="round"/>
    <!-- サッカーテキスト -->
    <text x="50" y="80" font-family="sans-serif" font-weight="bold" font-size="24" fill="#8e1c3a">SOCCER</text>
  </g>

  <!-- 右側：勉強 -->
  <g clip-path="url(#right-diagonal)">
    <rect width="400" height="300" fill="#8e1c3a"/>
    <!-- 鉛筆とノート -->
    <rect x="230" y="150" width="100" height="80" rx="5" fill="#fff"/>
    <line x1="240" y1="170" x2="310" y2="170" stroke="#ccc" stroke-width="2"/>
    <line x1="240" y1="190" x2="310" y2="190" stroke="#ccc" stroke-width="2"/>
    <line x1="240" y1="210" x2="290" y2="210" stroke="#ccc" stroke-width="2"/>
    <path d="M280 100 L320 60 L330 70 L290 110 Z" fill="#f4d03f"/>
    <polygon points="280,100 290,110 270,120" fill="#333"/>
    <!-- 勉強テキスト -->
    <text x="230" y="260" font-family="sans-serif" font-weight="bold" font-size="24" fill="#fff">STUDY</text>
  </g>

  <!-- 分割線 -->
  <line x1="250" y1="0" x2="150" y2="300" stroke="#fff" stroke-width="4"/>
</svg>
